services:
  - type: static
    name: appraisal-app
    # Use the root directory as the context
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
      - key: VITE_SUPABASE_ANON_KEY
      - key: VITE_SUPABASE_ENCRYPTION_KEY
      - key: VITE_MSAL_CLIENT_ID
      - key: VITE_MSAL_TENANT_ID
    # The absolute fix for SPA routing on Render
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
